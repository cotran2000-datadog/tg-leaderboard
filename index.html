<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TEE Multi-tasking Leaderboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Arial Black',Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
input,button{font-family:'Arial Black',Arial,sans-serif;outline:none}
button{cursor:pointer}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.row{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API='https://script.google.com/macros/s/AKfycbyY0_NEbZF6EXccgI5ri4StsSfbPL7fWURbKF4HphzLKvCjxWhBXoD2wXrlqTtj2Q0/exec';
const ADMIN_PIN='1234';
let entries=[];
let currentView='entry';
let submittedName='';
const MEDALS=['#E8B400','#9CA3AF','#CD7F32'];

function parseTime(v){
  v=(v||'').trim();
  let m=v.match(/^(\d{1,2}):(\d{2})(?:\.(\d{1,3}))?$/);
  if(m)return+m[1]*60000+ +m[2]*1000+parseInt((m[3]||'0').padEnd(3,'0'));
  m=v.match(/^(\d+)(?:\.(\d{1,3}))?$/);
  if(m)return+m[1]*1000+parseInt((m[2]||'0').padEnd(3,'0'));
  return null;
}
function fmt(ms){
  if(!ms&&ms!==0)return'—';
  const m=Math.floor(ms/60000),s=Math.floor(ms%60000/1000),cs=Math.floor(ms%1000/10);
  return m>0?`${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`:`${s}.${String(cs).padStart(2,'0')}`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function sorted(){
  return [...entries]
    .filter(e=>e.ms1&&e.ms2)
    .sort((a,b)=>(a.ms1+a.ms2)-(b.ms1+b.ms2))
    .concat(entries.filter(e=>!e.ms1||!e.ms2).sort((a,b)=>a.name.localeCompare(b.name)));
}

async function fetchEntries(){
  const res=await fetch(API+'?t='+Date.now());
  const data=await res.json();
  entries=data.map(e=>({...e,ms1:Number(e.ms1)||0,ms2:Number(e.ms2)||0}));
}

async function postEntry(entry){
  await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)});
}

async function pollEntries(){
  try{
    await fetchEntries();
    const modal=document.getElementById('admin-modal');
    const modalOpen=modal&&modal.style.display==='flex';
    if(currentView==='dashboard'&&!modalOpen)renderApp();
  }catch(e){console.warn('Poll failed',e)}
}

async function doSubmit(){
  const n=(document.getElementById('inp-name')?.value||'').trim();
  const t1=(document.getElementById('inp-lap1')?.value||'').trim();
  const t2=(document.getElementById('inp-lap2')?.value||'').trim();
  const err=document.getElementById('err');
  err.style.display='none';
  if(!n){err.style.display='block';err.textContent='Enter your name';return}
  const ms1=parseTime(t1);
  if(!ms1||ms1<=0){err.style.display='block';err.textContent='Enter a valid Lap 1 time — e.g. 79.43';return}
  const ms2=parseTime(t2);
  if(!ms2||ms2<=0){err.style.display='block';err.textContent='Enter a valid Lap 2 time — e.g. 79.43';return}
  const btn=document.getElementById('submit-btn');
  if(btn){btn.textContent='Saving...';btn.disabled=true;}
  try{
    const entry={id:Date.now(),name:n,ms1,ms2,ts:Date.now()};
    const idx=entries.findIndex(e=>e.name.toLowerCase()===n.toLowerCase());
    if(idx>=0)entries[idx]=entry;else entries.push(entry);
    await postEntry(entry);
    await new Promise(r=>setTimeout(r,1200));
    await fetchEntries();
    submittedName=n;
    renderApp();
  }catch(e){
    if(btn){btn.textContent='Set Times';btn.disabled=false;}
    err.style.display='block';err.textContent='Sync failed — check connection';
  }
}

async function doReset(){
  const p=document.getElementById('pin-inp')?.value;
  if(p===ADMIN_PIN){
    await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({reset:true})});
    await new Promise(r=>setTimeout(r,1200));
    await fetchEntries();
    hideAdminModal();
    renderApp();
  }else{
    const e=document.getElementById('pin-err');
    if(e)e.style.display='block';
  }
}

function showAdminModal(){
  const m=document.getElementById('admin-modal');
  if(m){m.style.display='flex';document.getElementById('pin-inp').value='';document.getElementById('pin-err').style.display='none';}
}
function hideAdminModal(){
  const m=document.getElementById('admin-modal');
  if(m)m.style.display='none';
}

function renderApp(){
  document.getElementById('app').innerHTML=currentView==='dashboard'?renderDashboard():renderEntry();
  if(currentView==='dashboard'){
    const qrEl=document.getElementById('qr-box');
    if(qrEl) new QRCode(qrEl,{text:location.href.split('?')[0],width:100,height:100,colorDark:'#ffffff',colorLight:'#1a1a1a'});
  }
}

function renderEntry(){
  const board=sorted().slice(0,5);
  const rows=board.map((e,i)=>{
    const total=e.ms1+e.ms2;
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
      <span style="width:20px;font-size:13px;font-weight:900;color:${i<3?MEDALS[i]:'rgba(255,255,255,0.28)'};text-align:center">${i===0?'⭐':i+1}</span>
      <span style="flex:1;font-size:13px;opacity:.8;text-transform:uppercase;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.name)}</span>
      <span style="font-family:'Courier New',monospace;font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px">${fmt(e.ms1)}+${fmt(e.ms2)}</span>
      <span style="font-family:'Courier New',monospace;font-size:14px;font-weight:900;color:${i===0?'#e8b400':'rgba(255,255,255,0.7)'};letter-spacing:1px;min-width:52px;text-align:right">${fmt(total)}</span>
    </div>`;
  }).join('');

  return`<div style="min-height:100vh;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:24px">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:#cc0000;border-radius:6px;margin-bottom:12px">
        <span style="font-size:22px;font-weight:900;color:#fff;letter-spacing:-1px">TEE</span>
      </div>
      <div style="font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase">Multi-tasking</div>
      <div style="font-size:11px;letter-spacing:4px;opacity:.45;text-transform:uppercase;margin-top:4px">Submit your times</div>
    </div>

    ${submittedName?`
    <div style="background:rgba(232,180,0,0.08);border:1px solid rgba(232,180,0,0.35);border-radius:8px;padding:32px 24px;text-align:center">
      <div style="font-size:40px">⭐</div>
      <div style="font-size:20px;font-weight:900;margin-top:10px;letter-spacing:1px;text-transform:uppercase">Times Set!</div>
      <div style="font-size:13px;opacity:.45;margin-top:6px;letter-spacing:1px">Check the big screen</div>
      <button onclick="submittedName='';renderApp()" style="margin-top:24px;background:#cc0000;border:none;color:#fff;padding:12px 28px;font-size:14px;border-radius:4px;font-family:inherit;font-weight:900;letter-spacing:2px;text-transform:uppercase">Submit Again</button>
    </div>`:`
    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:24px">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;opacity:.45;margin-bottom:8px">Your Name</label>
        <input id="inp-name" placeholder="e.g. The Stig" style="width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:14px 16px;font-size:18px;border-radius:4px;font-family:inherit"/>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:16px">
        <div style="flex:1">
          <label style="display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;opacity:.45;margin-bottom:8px">Lap 1</label>
          <input id="inp-lap1" placeholder="e.g. 79.43" style="width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:14px 12px;font-size:20px;border-radius:4px;font-family:'Courier New',monospace;letter-spacing:1px"/>
        </div>
        <div style="flex:1">
          <label style="display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;opacity:.45;margin-bottom:8px">Lap 2</label>
          <input id="inp-lap2" placeholder="e.g. 79.43" onkeydown="if(event.key==='Enter')doSubmit()" style="width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:14px 12px;font-size:20px;border-radius:4px;font-family:'Courier New',monospace;letter-spacing:1px"/>
        </div>
      </div>
      <div style="font-size:10px;opacity:.28;margin-bottom:16px;letter-spacing:1px;text-align:center">Format: ss.cs &nbsp;—&nbsp; ranked by combined total</div>
      <div id="err" style="color:#f87171;font-size:13px;margin-bottom:14px;text-align:center;letter-spacing:1px;display:none"></div>
      <button id="submit-btn" onclick="doSubmit()" style="width:100%;background:#cc0000;border:none;color:#fff;padding:16px;font-size:16px;border-radius:4px;font-family:inherit;font-weight:900;letter-spacing:3px;text-transform:uppercase">Set Times</button>
    </div>`}

    ${board.length>0?`<div style="margin-top:24px">
      <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;opacity:.28;text-align:center;margin-bottom:12px">Current standings</div>
      ${rows}
    </div>`:''}

    <button onclick="currentView='dashboard';renderApp()" style="width:100%;margin-top:20px;background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.35);padding:12px;font-size:12px;border-radius:4px;font-family:inherit;letter-spacing:2px;text-transform:uppercase">
      Open Dashboard View →
    </button>
  </div>
</div>`;
}

function renderDashboard(){
  const board=sorted();
  const complete=board.filter(e=>e.ms1&&e.ms2);
  const rows=complete.length===0
    ?`<div style="text-align:center;padding:80px 0;opacity:.22;font-size:20px;letter-spacing:4px;text-transform:uppercase">No times set yet</div>`
    :complete.map((e,i)=>{
      const isFirst=i===0;
      const total=e.ms1+e.ms2;
      const gap=i>0?(e.ms1+e.ms2)-(complete[0].ms1+complete[0].ms2):null;
      return`<div class="row" style="display:flex;align-items:center;gap:12px;background:${isFirst?'linear-gradient(90deg,rgba(232,180,0,0.14),rgba(232,180,0,0.03))':'rgba(255,255,255,0.04)'};border:1px solid ${isFirst?'rgba(232,180,0,0.45)':'rgba(255,255,255,0.07)'};border-radius:6px;padding:12px 16px;margin-bottom:10px">
        <div style="width:44px;text-align:center;flex-shrink:0">
          <div style="font-size:${isFirst?22:15}px;font-weight:900;color:${i<3?MEDALS[i]:'rgba(255,255,255,0.3)'};line-height:1">${isFirst?'⭐':i+1}</div>
          ${isFirst?`<div style="font-size:9px;color:#e8b400;letter-spacing:2px;margin-top:2px;text-transform:uppercase">Fastest</div>`:''}
        </div>
        <div style="flex:1;font-size:${isFirst?20:16}px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:${isFirst?'#fff':'rgba(255,255,255,0.82)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.name)}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:200px">
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:11px;opacity:.4;letter-spacing:1px">L1</span>
            <span style="font-family:'Courier New',monospace;font-size:14px;color:rgba(255,255,255,0.6);letter-spacing:1px">${fmt(e.ms1)}</span>
            <span style="font-size:11px;opacity:.4;letter-spacing:1px">L2</span>
            <span style="font-family:'Courier New',monospace;font-size:14px;color:rgba(255,255,255,0.6);letter-spacing:1px">${fmt(e.ms2)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            ${gap!==null?`<span style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px">+${fmt(gap)}</span>`:''}
            <span style="font-family:'Courier New',monospace;font-size:${isFirst?28:20}px;font-weight:900;color:${isFirst?'#e8b400':i<3?MEDALS[i]:'rgba(255,255,255,0.85)'};letter-spacing:2px">${fmt(total)}</span>
          </div>
        </div>
      </div>`;
    }).join('');

  return`<div style="background:#0a0a0a;min-height:100vh">
  <div style="background:linear-gradient(90deg,#cc0000,#880000);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid #dd0000">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:52px;height:52px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <span style="font-size:18px;font-weight:900;color:#cc0000;letter-spacing:-1px">TEE</span>
      </div>
      <div>
        <div style="font-size:26px;font-weight:900;letter-spacing:3px;text-transform:uppercase;line-height:1">Multi-tasking</div>
        <div style="font-size:11px;letter-spacing:4px;opacity:.7;text-transform:uppercase;margin-top:3px">Leaderboard</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button onclick="currentView='entry';renderApp()" style="background:transparent;border:2px solid rgba(255,255,255,0.4);color:#fff;padding:8px 16px;font-size:12px;letter-spacing:1px;border-radius:3px;font-family:inherit;text-transform:uppercase">Entry Mode</button>
      <button onclick="showAdminModal()" style="background:transparent;border:2px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);padding:8px 12px;font-size:12px;border-radius:3px;font-family:inherit">Reset</button>
    </div>
  </div>

  <div style="display:flex;gap:24px;padding:24px 28px;max-width:1200px;margin:0 auto">
    <div style="flex:1">${rows}</div>
    <div style="width:160px;flex-shrink:0;padding-top:8px">
      <div style="background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:16px;text-align:center">
        <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;opacity:.45;margin-bottom:12px">Scan to enter</div>
        <div id="qr-box" style="background:#1a1a1a;display:inline-block"></div>
        <div style="font-size:9px;opacity:.25;margin-top:10px;letter-spacing:1px;word-break:break-all">${esc(location.href.split('?')[0])}</div>
      </div>
      <div style="margin-top:12px;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.35">
        <div style="width:6px;height:6px;border-radius:50%;background:#4ade80;animation:blink 2s infinite"></div>LIVE
      </div>
    </div>
  </div>

  <div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);align-items:center;justify-content:center;z-index:99">
    <div style="background:#1c1c1c;border:1px solid rgba(255,255,255,0.13);border-radius:8px;padding:32px;width:300px;text-align:center">
      <div style="font-size:17px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Admin Reset</div>
      <div style="font-size:12px;opacity:.35;letter-spacing:1px;margin-bottom:20px">Enter PIN to clear all times</div>
      <input id="pin-inp" type="password" placeholder="PIN" onkeydown="if(event.key==='Enter')doReset()"
        style="width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);color:#fff;padding:10px 14px;font-size:22px;border-radius:4px;text-align:center;font-family:monospace;margin-bottom:8px"/>
      <div id="pin-err" style="color:#f87171;font-size:12px;margin-bottom:8px;display:none">Wrong PIN</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="hideAdminModal()" style="flex:1;background:transparent;border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.55);padding:10px;border-radius:4px;font-family:inherit;font-size:13px">Cancel</button>
        <button onclick="doReset()" style="flex:1;background:#cc0000;border:none;color:#fff;padding:10px;border-radius:4px;font-family:inherit;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase">Reset</button>
      </div>
      <div style="font-size:10px;opacity:.2;margin-top:14px;letter-spacing:1px">Default PIN: 1234</div>
    </div>
  </div>
</div>`;
}

(async()=>{
  document.getElementById('app').innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;font-size:14px;letter-spacing:3px;text-transform:uppercase;opacity:.4">Connecting...</div>`;
  try{
    await fetchEntries();
    renderApp();
    setInterval(pollEntries,4000);
  }catch(e){
    console.warn('Initial fetch failed:',e);
    renderApp();
    setInterval(pollEntries,4000);
  }
})();
</script>
</body>
</html>
